name: personal-secret-develop

services:
  workspace:
    container_name: personal-secret-develop-workspace
    build:
      context: ..
      dockerfile: .docker/Dockerfile.develop.workspace
    volumes:
      # bind
      - ..:/app
      - ~/.claude.json:/root/.claude.json # share account/config (auth token is NOT here — login once inside)
      # volume
      - claude-config:/root/.claude
      - vscode-server:/root/.vscode-server
    command: sleep infinity
    env_file:
      - ../.env/.env.develop

  api:
    container_name: personal-secret-develop-api
    build:
      context: ..
      dockerfile: .docker/Dockerfile.develop.api
    # run the server on `up` — reload is on in develop (is_develop), code is bind-mounted
    command: python -m personal_secret.api.bin.server
    volumes:
      - ..:/app:ro
    ports:
      # loopback-only — secrets server must not be reachable off-host
      - "127.0.0.1:${DEVELOP_API_PORT}:${DEVELOP_API_CONTAINER_PORT}"
    depends_on:
      - database
      - database-test
    env_file:
      - ../.env/.env.develop

  worker:
    build:
      context: ..
      dockerfile: .docker/Dockerfile.develop.api
    command: python -m personal_secret.api.bin.worker
    volumes:
      - ..:/app:ro
    depends_on:
      - database
    env_file:
      - ../.env/.env.develop
    deploy:
      replicas: ${DEVELOP_WORKER_REPLICAS}

  mcp:
    container_name: personal-secret-develop-mcp
    build:
      context: ..
      dockerfile: .docker/Dockerfile.develop.mcp
    volumes:
      - ..:/app:ro
    ports:
      - "127.0.0.1:${DEVELOP_MCP_PORT}:${DEVELOP_MCP_CONTAINER_PORT}"
    env_file:
      - ../.env/.env.develop

  database:
    container_name: personal-secret-develop-database
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DEVELOP_POSTGRES_USER}
      - POSTGRES_PASSWORD=${DEVELOP_POSTGRES_PASSWORD}
      - POSTGRES_DB=${DEVELOP_POSTGRES_DB}
    ports:
      - "127.0.0.1:${DEVELOP_POSTGRES_PORT}:${DEVELOP_POSTGRES_CONTAINER_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  database-test:
    container_name: personal-secret-develop-database-test
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${TEST_POSTGRES_USER}
      - POSTGRES_PASSWORD=${TEST_POSTGRES_PASSWORD}
      - POSTGRES_DB=${TEST_POSTGRES_DB}
    ports:
      - "127.0.0.1:${TEST_POSTGRES_PORT}:${TEST_POSTGRES_CONTAINER_PORT}"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  postgres_test_data:
  claude-config:
  vscode-server:
